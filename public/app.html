<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMAgents · AI Tool Suite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0c10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .dashboard {
      max-width: 1500px;
      width: 100%;
      height: 92vh;
      max-height: 880px;
      background: rgba(18, 22, 28, 0.8);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 40px;
      box-shadow: 0 30px 60px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ===== LEFT SIDEBAR: tools + threads ===== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: rgba(12, 16, 22, 0.6);
      border-right: 1px solid rgba(255,255,255,0.04);
      padding: 28px 18px 24px 18px;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding-left: 6px;
      flex-shrink: 0;
    }

    .brand-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #7c5cfc, #a78bfa);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: white;
      box-shadow: 0 8px 24px -6px #7c5cfc80;
    }

    .brand-text h1 { font-size: 22px; font-weight: 700; color: #f0f4fe; letter-spacing: -0.3px; }
    .brand-text span { font-size: 13px; color: #8896b0; display: block; margin-top: 2px; }

    .tool-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
      margin-bottom: 18px;
    }

    .tool-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 16px;
      border-radius: 16px;
      color: #b6c2da;
      font-weight: 500;
      font-size: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
      border: 1px solid transparent;
      background: transparent;
    }

    .tool-item i { width: 22px; font-size: 16px; color: #7a88a6; transition: 0.2s; }
    .tool-item:hover { background: rgba(255,255,255,0.04); color: #eaeef7; }
    .tool-item:hover i { color: #a78bfa; }
    .tool-item.active {
      background: rgba(124, 92, 252, 0.15);
      border-color: rgba(124, 92, 252, 0.25);
      color: #f0f4fe;
    }
    .tool-item.active i { color: #a78bfa; }

    /* model picker, sits below tool list */
    .model-picker-block {
      flex-shrink: 0;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    .model-picker-block label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6a7a94;
      display: block;
      margin-bottom: 6px;
    }

    .model-picker-block select {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 9px 12px;
      color: #eef2f9;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
    }
    .model-picker-block select option { background: #1a1f29; color: #eef2f9; }

    .new-thread-btn {
      width: 100%;
      background: rgba(124, 92, 252, 0.12);
      border: 1px solid rgba(124, 92, 252, 0.3);
      color: #cdbfff;
      border-radius: 12px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }
    .new-thread-btn:hover { background: rgba(124, 92, 252, 0.22); }

    /* thread history panel */
    .thread-panel-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6a7a94;
      padding: 0 4px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .thread-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 2px;
    }

    .thread-list::-webkit-scrollbar { width: 4px; }
    .thread-list::-webkit-scrollbar-thumb { background: #3d4452; border-radius: 10px; }

    .thread-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 12px;
      cursor: pointer;
      color: #9aabca;
      font-size: 13px;
      transition: 0.15s;
      border: 1px solid transparent;
    }
    .thread-row:hover { background: rgba(255,255,255,0.03); color: #d0d9ec; }
    .thread-row.active {
      background: rgba(124, 92, 252, 0.13);
      border-color: rgba(124, 92, 252, 0.22);
      color: #f0f4fe;
    }
    .thread-row .thread-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .thread-row .thread-time { font-size: 11px; color: #5b6a84; flex-shrink: 0; }
    .thread-empty {
      color: #5b6a84;
      font-size: 12.5px;
      padding: 10px 12px;
      line-height: 1.5;
    }

    .sidebar-footer {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
    }
    .sidebar-footer .user-card { display: flex; align-items: center; gap: 12px; padding: 4px; }
    .user-avatar {
      width: 36px; height: 36px; background: #2a3140; border-radius: 40px;
      display: flex; align-items: center; justify-content: center; color: #b6c2da; font-weight: 600;
    }
    .user-info { font-size: 13.5px; color: #d0d9ec; }
    .user-info small { display: block; font-size: 11.5px; color: #6a7a94; }

    /* ===== MAIN AREA ===== */
    .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

    .chat-header {
      padding: 18px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
    }

    .header-title { display: flex; align-items: center; gap: 12px; }
    .header-title i { color: #a78bfa; font-size: 18px; }
    .header-title span { color: #eef2f9; font-weight: 600; font-size: 15px; }
    .header-title small { color: #6a7a94; font-size: 12.5px; margin-left: 6px; }

    .job-status-pill {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 40px;
      background: rgba(124, 92, 252, 0.12);
      border: 1px solid rgba(124, 92, 252, 0.25);
      color: #cdbfff;
      font-size: 12.5px;
      font-weight: 500;
    }
    .job-status-pill.visible { display: flex; }
    .job-status-pill .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(205,191,255,0.3);
      border-top-color: #cdbfff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .chat-messages {
      flex: 1;
      padding: 24px 28px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #3d4452; border-radius: 10px; }

    .message {
      max-width: 80%;
      padding: 14px 20px;
      border-radius: 24px;
      font-size: 15px;
      line-height: 1.6;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      word-break: break-word;
    }
    @keyframes slideUp { 0% { opacity: 0; transform: translateY(14px) scale(0.96); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(145deg, #2d3440, #1e232e);
      border-bottom-right-radius: 6px;
      color: #eef4fd;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .message.ai {
      align-self: flex-start;
      background: rgba(40, 46, 58, 0.7);
      border-bottom-left-radius: 6px;
      color: #eef4fd;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .message .msg-icon { margin-right: 10px; color: #a78bfa; }
    .message .timestamp { font-size: 10px; opacity: 0.35; margin-top: 6px; text-align: right; }
    .message .attachment-media { display: block; max-width: 100%; border-radius: 14px; margin-top: 8px; }
    .message .attachment-media.audio { width: 280px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #5b6a84;
      gap: 10px;
      text-align: center;
      padding: 0 40px;
    }
    .empty-state i { font-size: 32px; color: #3a4356; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    .chat-input-area {
      padding: 16px 24px 24px 24px;
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
      background: rgba(0,0,0,0.1);
    }

    .input-wrapper {
      flex: 1;
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 4px 4px 4px 22px;
      transition: 0.2s;
    }
    .input-wrapper:focus-within { border-color: #7c5cfc; box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.12); }
    .input-wrapper input {
      width: 100%; background: transparent; border: none; padding: 14px 0;
      font-size: 15px; color: #f0f4fc; outline: none; font-family: 'Inter', sans-serif;
    }
    .input-wrapper input::placeholder { color: #5b6a84; }
    .input-wrapper button {
      background: #7c5cfc; border: none; border-radius: 30px; padding: 10px 24px;
      color: white; font-weight: 600; font-size: 14px;
      display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s;
      box-shadow: 0 8px 24px -8px #7c5cfc; font-family: 'Inter', sans-serif;
    }
    .input-wrapper button:hover { background: #6b4be8; transform: scale(1.02); }
    .input-wrapper button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    @media (max-width: 820px) {
      .sidebar { width: 240px; min-width: 240px; padding: 20px 12px; }
      .brand-text h1 { font-size: 18px; }
    }
    @media (max-width: 640px) {
      .dashboard { flex-direction: column; height: 98vh; border-radius: 28px; }
      .sidebar { width: 100%; min-width: unset; max-height: 280px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.04); }
      .chat-header { padding: 12px 16px; }
      .message { max-width: 92%; }
    }
  </style>
</head>
<body>

<div class="dashboard" id="appContainer">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-brain"></i></div>
      <div class="brand-text">
        <h1>SMAgents</h1>
        <span>AI tool suite</span>
      </div>
    </div>

    <div class="tool-list" id="toolList">
      <div class="tool-item active" data-tool="chat"><i class="fas fa-comment-dots"></i> Chat</div>
      <div class="tool-item" data-tool="image"><i class="fas fa-image"></i> Image</div>
      <div class="tool-item" data-tool="video"><i class="fas fa-video"></i> Video</div>
      <div class="tool-item" data-tool="audio"><i class="fas fa-waveform-lines"></i> Audio</div>
      <div class="tool-item" data-tool="agent"><i class="fas fa-robot"></i> Agent</div>
    </div>

    <div class="model-picker-block">
      <label>Model</label>
      <select id="modelSelect"><option value="">Loading…</option></select>
      <button class="new-thread-btn" id="newThreadBtn"><i class="fas fa-plus"></i> New conversation</button>
    </div>

    <div class="thread-panel-label">History</div>
    <div class="thread-list" id="threadList">
      <div class="thread-empty">No conversations yet for this model.</div>
    </div>

    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar"><i class="fas fa-user"></i></div>
        <div class="user-info">Sanjay <small>Admin</small></div>
      </div>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="chat-header">
      <div class="header-title">
        <i class="fas fa-comment-dots" id="headerIcon"></i>
        <span id="headerTitle">New conversation</span>
        <small id="headerModelLabel"></small>
      </div>
      <div class="job-status-pill" id="jobStatusPill">
        <div class="spinner"></div>
        <span id="jobStatusText">Generating…</span>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <i class="fas fa-comment-dots"></i>
        <p>Pick a model and start typing — this conversation will be<br/>saved and you can find it again in History.</p>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="input-wrapper">
        <input type="text" id="chatInput" placeholder="Ask SMAgents anything…" />
        <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i> Send</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  // ================= tool/model registry (mirrors lib/registry.js) =================
  // Kept in sync manually with the server-side registry. The server is
  // still the source of truth for which models are actually allowed —
  // this client copy is only used to populate the picker without an
  // extra round trip, and to know each tool's icon/label.
  const TOOL_META = {
    chat:  { label: 'Chat',  icon: 'fa-comment-dots' },
    image: { label: 'Image', icon: 'fa-image' },
    video: { label: 'Video', icon: 'fa-video' },
    audio: { label: 'Audio', icon: 'fa-waveform-lines' },
    agent: { label: 'Agent', icon: 'fa-robot' },
  };

  const MODELS_BY_TOOL = {
    chat: [
      'meta/llama-3.3-70b-instruct',
      'meta/llama-3.1-70b-instruct',
      'meta/llama-3.1-8b-instruct',
      'meta/llama-4-maverick-17b-128e-instruct',
      'deepseek-ai/deepseek-v4-flash',
      'deepseek-ai/deepseek-v4-pro',
      'mistralai/mistral-large-3-675b-instruct-2512',
      'moonshotai/kimi-k2.6',
    ],
    image: [
      'black-forest-labs/flux-1.1-pro',
      'black-forest-labs/flux-schnell',
      'stability-ai/stable-diffusion-3.5-large',
    ],
    video: [
      'nvidia/cosmos-transfer1-7b',
      'nvidia/cosmos3-nano',
      'wan-video/wan-2.1',
    ],
    audio: [
      'nvidia/magpie-tts-zeroshot',
      'elevenlabs/tts-multilingual',
      'openai/whisper-large-v3',
    ],
    agent: [
      'agent/code-exec-js',
      'agent/browser-automation',
    ],
  };

  // tool -> mode, mirrors lib/registry.js. chat is sync/streaming;
  // everything else goes through the async job endpoints.
  const SYNC_TOOLS = new Set(['chat']);

  // ================= DOM refs =================
  const toolList = document.getElementById('toolList');
  const modelSelect = document.getElementById('modelSelect');
  const newThreadBtn = document.getElementById('newThreadBtn');
  const threadList = document.getElementById('threadList');
  const chatMessages = document.getElementById('chatMessages');
  const emptyState = document.getElementById('emptyState');
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendMsgBtn');
  const headerIcon = document.getElementById('headerIcon');
  const headerTitle = document.getElementById('headerTitle');
  const headerModelLabel = document.getElementById('headerModelLabel');
  const jobStatusPill = document.getElementById('jobStatusPill');
  const jobStatusText = document.getElementById('jobStatusText');

  // ================= state =================
  let activeTool = 'chat';
  let activeModel = MODELS_BY_TOOL.chat[0];
  let activeThreadId = null;
  let conversation = []; // {role, content} pairs sent to /api/chat for streaming context
  let isBusy = false;

  // ================= helpers =================
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str == null ? '' : str;
    return div.innerHTML;
  }

  function showEmptyState(show) {
    emptyState.style.display = show ? 'flex' : 'none';
  }

  function clearMessages() {
    chatMessages.innerHTML = '';
    chatMessages.appendChild(emptyState);
  }

  function attachmentMarkup(attachments) {
    if (!attachments || !attachments.length) return '';
    return attachments.map((a) => {
      const url = escapeHtml(a.url);
      if (a.type === 'image') return `<img class="attachment-media" src="${url}" alt="generated image" />`;
      if (a.type === 'video') return `<video class="attachment-media" src="${url}" controls></video>`;
      if (a.type === 'audio') return `<audio class="attachment-media audio" src="${url}" controls></audio>`;
      return `<a class="attachment-media" href="${url}" target="_blank" rel="noopener">View result</a>`;
    }).join('');
  }

  function addMessage(role, content, attachments, timestampIso) {
    showEmptyState(false);
    const type = role === 'user' ? 'user' : 'ai';
    const div = document.createElement('div');
    div.className = `message ${type}`;
    const textPart = content ? `<span class="msg-text">${escapeHtml(content)}</span>` : '';
    const iconPart = type === 'ai' ? '<i class="fas fa-robot msg-icon"></i> ' : '';
    div.innerHTML = `${iconPart}${textPart}${attachmentMarkup(attachments)}`;
    const ts = document.createElement('div');
    ts.className = 'timestamp';
    const d = timestampIso ? new Date(timestampIso) : new Date();
    ts.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.appendChild(ts);
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return div;
  }

  function updateMessageText(div, text) {
    const span = div.querySelector('.msg-text');
    if (span) span.innerHTML = escapeHtml(text);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  function setBusy(busy) {
    isBusy = busy;
    sendBtn.disabled = busy;
  }

  function setJobStatus(visible, text) {
    jobStatusPill.classList.toggle('visible', visible);
    if (text) jobStatusText.textContent = text;
  }

  function formatThreadTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    return sameDay
      ? d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  // ================= model picker =================
  function populateModelSelect() {
    const models = MODELS_BY_TOOL[activeTool] || [];
    modelSelect.innerHTML = '';
    models.forEach((id) => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = id;
      modelSelect.appendChild(opt);
    });
    activeModel = models.includes(activeModel) ? activeModel : models[0];
    modelSelect.value = activeModel || '';
  }

  // ================= header =================
  function updateHeader(thread) {
    const meta = TOOL_META[activeTool];
    headerIcon.className = `fas ${meta.icon}`;
    headerTitle.textContent = thread ? thread.title : `New ${meta.label.toLowerCase()} conversation`;
    headerModelLabel.textContent = activeModel ? `· ${activeModel}` : '';
  }

  // ================= threads: list / load / create =================
  async function fetchThreads() {
    if (!activeModel) return [];
    try {
      const res = await fetch(`/api/threads?tool=${encodeURIComponent(activeTool)}&model=${encodeURIComponent(activeModel)}`);
      if (!res.ok) return [];
      const data = await res.json();
      return data.threads || [];
    } catch {
      return [];
    }
  }

  function renderThreadList(threads) {
    threadList.innerHTML = '';
    if (!threads.length) {
      threadList.innerHTML = '<div class="thread-empty">No conversations yet for this model.</div>';
      return;
    }
    threads.forEach((t) => {
      const row = document.createElement('div');
      row.className = 'thread-row' + (t.id === activeThreadId ? ' active' : '');
      row.innerHTML = `
        <i class="fas fa-message" style="font-size:12px;color:#5b6a84;"></i>
        <span class="thread-title">${escapeHtml(t.title)}</span>
        <span class="thread-time">${formatThreadTime(t.updated_at)}</span>
      `;
      row.addEventListener('click', () => selectThread(t.id));
      threadList.appendChild(row);
    });
  }

  async function refreshThreadList() {
    const threads = await fetchThreads();
    renderThreadList(threads);
    return threads;
  }

  async function createThread() {
    const res = await fetch('/api/threads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tool: activeTool, model: activeModel }),
    });
    if (!res.ok) throw new Error('Failed to create conversation');
    const data = await res.json();
    return data.thread;
  }

  async function loadThreadMessages(threadId) {
    const res = await fetch(`/api/threads/${threadId}`);
    if (!res.ok) throw new Error('Failed to load conversation');
    return res.json(); // { thread, messages }
  }

  async function selectThread(threadId) {
    activeThreadId = threadId;
    conversation = [];
    clearMessages();
    showEmptyState(false);

    try {
      const { thread, messages } = await loadThreadMessages(threadId);
      updateHeader(thread);
      messages.forEach((m) => {
        addMessage(m.role, m.content, m.attachments, m.created_at);
        if (m.role === 'user' || m.role === 'assistant') {
          conversation.push({ role: m.role, content: m.content || '' });
        }
      });
      if (!messages.length) showEmptyState(true);
    } catch (err) {
      addMessage('assistant', `⚠️ ${err.message}`);
    }

    const threads = await fetchThreads();
    renderThreadList(threads);
  }

  async function startNewThread() {
    activeThreadId = null;
    conversation = [];
    clearMessages();
    showEmptyState(true);
    updateHeader(null);
    renderThreadList(await fetchThreads());
  }

  // Ensures there's an active thread before sending the first message
  // in a "New conversation" state — created lazily so empty threads
  // don't pile up just from switching tools/models.
  async function ensureThread() {
    if (activeThreadId) return activeThreadId;
    const thread = await createThread();
    activeThreadId = thread.id;
    updateHeader(thread);
    return activeThreadId;
  }

  // ================= switching tools / models =================
  async function switchTool(tool) {
    activeTool = tool;
    document.querySelectorAll('.tool-item').forEach((el) => {
      el.classList.toggle('active', el.dataset.tool === tool);
    });
    populateModelSelect();
    await switchModel(activeModel, /*skipPickerSync*/ true);
  }

  async function switchModel(model, skipPickerSync) {
    activeModel = model;
    if (!skipPickerSync) modelSelect.value = model;
    activeThreadId = null;
    conversation = [];
    clearMessages();
    setJobStatus(false);

    const threads = await refreshThreadList();
    if (threads.length) {
      await selectThread(threads[0].id);
    } else {
      showEmptyState(true);
      updateHeader(null);
    }
  }

  // ================= sending: chat (sync/stream) =================
  async function sendChatMessage(text) {
    const threadId = await ensureThread();
    addMessage('user', text);
    conversation.push({ role: 'user', content: text });

    const aiDiv = addMessage('assistant', '…');
    let fullText = '';

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversation, model: activeModel, stream: true, threadId }),
    });

    if (!res.ok || !res.body) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `Request failed (${res.status})`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed.startsWith('data:')) continue;
        const payload = trimmed.slice(5).trim();
        if (payload === '[DONE]') continue;
        try {
          const json = JSON.parse(payload);
          const delta = json.choices?.[0]?.delta?.content;
          if (delta) {
            fullText += delta;
            updateMessageText(aiDiv, fullText);
          }
        } catch { /* ignore malformed chunk */ }
      }
    }

    if (!fullText) fullText = '(no response)';
    updateMessageText(aiDiv, fullText);
    conversation.push({ role: 'assistant', content: fullText });
    refreshThreadList(); // updated_at changed server-side
  }

  // ================= sending: image/video/audio/agent (async job) =================
  async function sendJobMessage(text) {
    const threadId = await ensureThread();
    addMessage('user', text);

    setJobStatus(true, 'Starting…');

    const createRes = await fetch('/api/jobs/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: activeModel, input: { prompt: text }, threadId }),
    });
    if (!createRes.ok) {
      const errData = await createRes.json().catch(() => ({}));
      setJobStatus(false);
      throw new Error(errData.error || `Failed to start job (${createRes.status})`);
    }
    const { jobId } = await createRes.json();

    const statusLabels = { queued: 'Queued…', running: 'Generating…' };
    let finalJob = null;

    // Poll every 2s. Each poll opportunistically advances the job
    // server-side (see pages/api/jobs/[id].js) so this loop alone
    // drives progress without a separate cron in v1.
    for (let attempt = 0; attempt < 150; attempt++) { // ~5 min ceiling
      await new Promise((r) => setTimeout(r, 2000));
      const pollRes = await fetch(`/api/jobs/${jobId}`);
      if (!pollRes.ok) continue;
      const { job } = await pollRes.json();
      if (!job) continue;
      setJobStatus(true, statusLabels[job.status] || 'Working…');
      if (job.status === 'done' || job.status === 'failed') {
        finalJob = job;
        break;
      }
    }

    setJobStatus(false);

    if (!finalJob) {
      addMessage('assistant', '⚠️ Timed out waiting for the result. Check History — it may still finish in the background.');
      return;
    }
    if (finalJob.status === 'failed') {
      addMessage('assistant', `⚠️ Generation failed: ${finalJob.error || 'unknown error'}`);
      return;
    }

    const attachment = finalJob.output?.result_url
      ? [{ type: activeTool, url: finalJob.output.result_url }]
      : [];
    addMessage('assistant', attachment.length ? null : 'Done.', attachment);
    refreshThreadList();
  }

  // ================= unified send handler =================
  async function handleSend() {
    const text = chatInput.value.trim();
    if (!text || isBusy) return;
    chatInput.value = '';
    setBusy(true);
    try {
      if (SYNC_TOOLS.has(activeTool)) {
        await sendChatMessage(text);
      } else {
        await sendJobMessage(text);
      }
    } catch (err) {
      addMessage('assistant', `⚠️ ${err.message}`);
      setJobStatus(false);
    } finally {
      setBusy(false);
    }
  }

  // ================= wiring =================
  toolList.addEventListener('click', (e) => {
    const item = e.target.closest('.tool-item');
    if (!item) return;
    switchTool(item.dataset.tool);
  });

  modelSelect.addEventListener('change', () => switchModel(modelSelect.value));
  newThreadBtn.addEventListener('click', startNewThread);
  sendBtn.addEventListener('click', handleSend);
  chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });

  // ================= boot =================
  (async function init() {
    populateModelSelect();
    updateHeader(null);
    const threads = await refreshThreadList();
    if (threads.length) {
      await selectThread(threads[0].id);
    } else {
      showEmptyState(true);
    }
  })();
})();
</script>

</body>
</html>
